name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync SvelteKit types
        run: bunx svelte-kit sync
        env:
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Run Bun unit tests with coverage
        id: bun-tests
        continue-on-error: true
        env:
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: |
          echo "Bun version: $(bun --version)"
          bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/bun 2>&1 | tee /tmp/bun-test-output.txt
          BUN_EXIT="${PIPESTATUS[0]}"
          echo "BUN_EXIT=${BUN_EXIT}" >> "$GITHUB_OUTPUT"
          exit "${BUN_EXIT}"

      - name: Run Vitest component tests with coverage
        id: vitest
        continue-on-error: true
        env:
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: |
          bun run test:unit -- --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage/vitest 2>&1 | tee /tmp/vitest-output.txt
          VITEST_EXIT="${PIPESTATUS[0]}"
          echo "VITEST_EXIT=${VITEST_EXIT}" >> "$GITHUB_OUTPUT"
          exit "${VITEST_EXIT}"

      - name: Post failure output as PR comment
        if: github.event_name == 'pull_request' && (steps.bun-tests.outcome == 'failure' || steps.vitest.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Test Failure Debug Output\n\n';
            try {
              const bunOut = fs.readFileSync('/tmp/bun-test-output.txt', 'utf8');
              const lines = bunOut.split('\n');
              body += '### Bun test output (first 150 lines)\n```\n';
              body += lines.slice(0, 150).join('\n');
              body += '\n```\n\n';
              body += '### Bun test output (last 60 lines)\n```\n';
              body += lines.slice(-60).join('\n');
              body += '\n```\n\n';
            } catch (e) { body += 'bun output unavailable\n\n'; }
            try {
              const vitestOut = fs.readFileSync('/tmp/vitest-output.txt', 'utf8');
              body += '### Vitest output (last 60 lines)\n```\n';
              body += vitestOut.split('\n').slice(-60).join('\n');
              body += '\n```\n';
            } catch (e) { body += 'vitest output unavailable\n'; }
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Fail if tests failed
        if: steps.bun-tests.outcome == 'failure' || steps.vitest.outcome == 'failure'
        run: exit 1

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/bun/lcov.info,coverage/vitest/lcov.info
