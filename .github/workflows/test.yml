name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Debug environment
        run: |
          bun --version
          node --version 2>/dev/null || echo "no node"
          uname -a
          bun test --list-tests 2>&1 | head -20 || bun test --dry-run 2>&1 | head -20 || echo "list-tests not supported"

      - name: Run Bun unit tests without coverage (smoke test)
        run: bun test

      - name: Run Bun unit tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/bun

      - name: Run Vitest component tests with coverage
        run: bun run test:unit -- --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage/vitest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/bun/lcov.info,coverage/vitest/lcov.info
