name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync SvelteKit types
        run: bunx svelte-kit sync

      - name: Diagnose environment
        run: |
          echo "=== bun version ===" && bun --version
          echo "=== .svelte-kit/tsconfig.json ===" && (test -f .svelte-kit/tsconfig.json && echo EXISTS || echo MISSING)
          echo "=== node_modules ===" && (test -d node_modules && echo EXISTS || echo MISSING)
          echo "=== DATABASE_URL ===" && echo "${DATABASE_URL:-(not set)}"

      - name: Run Bun unit tests
        id: bun-test
        run: bun test 2>&1 | tee /tmp/bun-output.txt; exit ${PIPESTATUS[0]}

      - name: Post test output as PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('/tmp/bun-output.txt', 'utf8'); } catch(e) { output = 'No output captured'; }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🔍 Bun Test Diagnostic Output\n```\n' + output.slice(0, 65000) + '\n```'
            });

      - name: Run Bun unit tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/bun

      - name: Run Vitest component tests with coverage
        run: bun run test:unit -- --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage/vitest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/bun/lcov.info,coverage/vitest/lcov.info
